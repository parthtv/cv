name: Update Scholar Stats

on:
  schedule:
    - cron: '17 6 * * *'   # runs daily ~6am UTC
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

# Needed so the bot can push the updated JSON back to the repo.
permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Fetch Google Scholar stats
        run: |
          python3 - <<'PYEOF'
          import urllib.request, urllib.error, re, json, os, time

          # Locate the existing scholar_stats.json so this works whether the repo
          # root is the site root (file at ./scholar_stats.json) or the site is a
          # /cv/ subfolder (file at ./cv/scholar_stats.json). Falls back to cv/.
          CANDIDATES = ["cv/scholar_stats.json", "scholar_stats.json"]
          OUT = next((p for p in CANDIDATES if os.path.exists(p)), "cv/scholar_stats.json")
          print("Writing to:", OUT)

          url = "https://scholar.google.com/citations?user=ZdSXW6QAAAAJ&hl=en"
          headers = {
              "User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 "
                            "(KHTML, like Gecko) Chrome/120.0 Safari/537.36",
              "Accept-Language": "en-US,en;q=0.9",
          }

          def load_existing():
              try:
                  with open(OUT) as f:
                      return json.load(f)
              except Exception:
                  return {"h_index": None, "i10_index": None, "citations": None}

          def fetch_html():
              # Retry a few times: Scholar frequently rate-limits datacenter IPs.
              last = None
              for attempt in range(3):
                  try:
                      req = urllib.request.Request(url, headers=headers)
                      return urllib.request.urlopen(req, timeout=20).read().decode("utf-8")
                  except Exception as e:
                      last = e
                      time.sleep(5 * (attempt + 1))
              raise last

          stats = load_existing()
          try:
              html = fetch_html()
              # The stats table has two columns (All / Since 20XX), so the values
              # appear in row-major order:
              #   [citations_all, citations_since, h_all, h_since, i10_all, i10_since]
              nums = re.findall(r'gsc_rsb_std">(\d+)', html)
              if len(nums) >= 5:
                  stats = {
                      "citations": int(nums[0]),
                      "h_index":   int(nums[2]),
                      "i10_index": int(nums[4]),
                  }
                  print("Fetched fresh stats:", stats)
              else:
                  # Blocked / CAPTCHA / layout change: keep last-good values.
                  stats["fetch_error"] = "parse failed (%d values found)" % len(nums)
                  print("Parse failed, keeping previous stats:", stats)
          except Exception as e:
              # Network error / block: keep last-good values, do not crash the job.
              stats["fetch_error"] = "fetch failed: %s" % e
              print("Fetch failed, keeping previous stats:", stats)

          os.makedirs(os.path.dirname(OUT), exist_ok=True)
          with open(OUT, "w") as f:
              json.dump(stats, f)
          PYEOF

      - name: Commit updated stats
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: update scholar stats"
          git push
